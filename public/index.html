<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール調整</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5BAD4A">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <header class="header">
    <h1><a href="/" style="color:white;text-decoration:none;display:inline-flex;align-items:center;gap:8px"><img src="/schedule-icon.png" style="width:32px;height:32px;object-fit:contain;border-radius:6px">スケジュール調整</a></h1>
    <nav class="header-nav">
      <span id="userArea" style="display:inline-flex;align-items:center;gap:6px"></span>
      <a href="/contacts.html"><img src="/address-book.png" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:4px">アドレス帳</a>
    </nav>
  </header>

  <div class="container">

    <!-- ① ヒーロー：使い方3ステップ -->
    <div class="card" style="text-align:center">
      <img src="/icon-192.png" alt="エコリースちゃん" style="width:88px;height:88px;object-fit:contain;margin-bottom:10px;border-radius:20px">
      <p style="font-size:20px;font-weight:bold;color:#333;margin-bottom:6px">日程調整を　かんたんに。</p>
      <p style="font-size:13px;color:#999;margin-bottom:0">候補日を選んで参加者にURLを送るだけで出欠が集まります</p>

      <div class="steps">
        <div class="step">
          <div class="step-num">①</div>
          <div class="step-label">イベント作成</div>
          <div class="step-desc">候補日程を<br>カレンダーで選ぶ</div>
        </div>
        <div class="step-arrow">›</div>
        <div class="step">
          <div class="step-num">②</div>
          <div class="step-label">URLを共有</div>
          <div class="step-desc">メールで送る</div>
        </div>
        <div class="step-arrow">›</div>
        <div class="step">
          <div class="step-num">③</div>
          <div class="step-label">結果を確認</div>
          <div class="step-desc">○△×の回答を<br>一覧で見る</div>
        </div>
      </div>
    </div>

    <!-- ② クイックリンク -->
    <a href="/events.html" class="card home-link-card">
      <span style="font-size:32px;line-height:1">📋</span>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:bold;color:#5BAD4A;margin-bottom:2px">イベント一覧</div>
        <div class="hint" style="margin:0">作成済みイベントの進捗を確認できます</div>
      </div>
      <span style="font-size:20px;color:#B3D9AE;font-weight:bold">›</span>
    </a>

    <a href="/contacts.html" class="card home-link-card">
      <img src="/address-book.png" style="width:36px;height:36px;object-fit:contain">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:bold;color:#5BAD4A;margin-bottom:2px">アドレス帳</div>
        <div class="hint" style="margin:0">メールの宛先を管理・共有できます</div>
      </div>
      <span style="font-size:20px;color:#B3D9AE;font-weight:bold">›</span>
    </a>

    <!-- ③ イベント作成フォーム -->
    <div class="card" id="createCard">
      <div class="card-title"><span style="filter: hue-rotate(90deg) saturate(2)">🗓️</span> 新しいイベントを作成する</div>

      <div class="form-group">
        <label>イベント名 <span style="color:#e55">*</span></label>
        <input type="text" id="title" placeholder="例: 6月のミーティング">
      </div>

      <div class="form-group">
        <label>メモ（任意）</label>
        <textarea id="description" rows="2" placeholder="場所・備考など" style="resize:vertical"></textarea>
      </div>

      <div class="form-group">
        <label>回答締切日 <span style="color:#e55">*</span></label>
        <input type="date" id="deadline" required style="width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:#FAFAFA;box-sizing:border-box">
      </div>

      <div class="form-group">
        <label>候補日程 <span style="color:#e55">*</span></label>
        <p class="hint" style="margin-bottom:10px">カレンダーで日付をクリックして選択。時間は右側に入力できます。</p>

        <!-- カレンダー -->
        <div class="calendar">
          <div class="cal-header">
            <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
            <span id="calTitle"></span>
            <button class="cal-nav" onclick="changeMonth(1)">▶</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>

        <!-- 選択済み日程 -->
        <div id="selectedChips" class="selected-chips"></div>
        <p class="hint" id="noDateHint" style="text-align:center">日付をタップして選択してください</p>
      </div>

      <button class="btn btn-primary" id="createBtn">イベントを作成する →</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const WEEKDAYS = ['日','月','火','水','木','金','土'];
    const MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    let today    = new Date();
    let curYear  = today.getFullYear();
    let curMonth = today.getMonth();
    let selected = {}; // key: "YYYY-MM-DD", value: { label, time }

    function pad(n){ return String(n).padStart(2,'0'); }

    function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

    function jpLabel(y,m,d){
      const dt = new Date(y,m,d);
      return `${m+1}月${d}日（${WEEKDAYS[dt.getDay()]}）`;
    }

    function renderCalendar(){
      document.getElementById('calTitle').textContent = `${curYear}年 ${MONTHS[curMonth]}`;
      const grid = document.getElementById('calGrid');
      grid.innerHTML = WEEKDAYS.map(w=>`<div class="cal-dow">${w}</div>`).join('');

      const firstDay = new Date(curYear, curMonth, 1).getDay();
      const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

      for(let i=0;i<firstDay;i++) grid.insertAdjacentHTML('beforeend','<div class="cal-empty"></div>');

      for(let d=1;d<=daysInMonth;d++){
        const dt  = new Date(curYear, curMonth, d);
        const key = dateKey(curYear, curMonth, d);
        const dow = dt.getDay();
        const isToday = (dt.toDateString() === today.toDateString());
        const isPast  = dt < new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const isSel   = !!selected[key];

        let cls = 'cal-day';
        if(dow===0) cls += ' cal-sun';
        if(dow===6) cls += ' cal-sat';
        if(isToday) cls += ' cal-today';
        if(isPast)  cls += ' cal-past';
        if(isSel)   cls += ' cal-selected';

        const clickAttr = isPast ? '' : `onclick="toggleDate('${key}','${jpLabel(curYear,curMonth,d)}')"`;
        grid.insertAdjacentHTML('beforeend',`<div class="${cls}" ${clickAttr}>${d}</div>`);
      }
    }

    function changeMonth(dir){
      curMonth += dir;
      if(curMonth < 0){ curMonth=11; curYear--; }
      if(curMonth > 11){ curMonth=0;  curYear++; }
      renderCalendar();
    }

    function toggleDate(key, label){
      if(selected[key]){
        delete selected[key];
      } else {
        selected[key] = { label, time:'00:00' };
      }
      renderCalendar();
      renderChips();
    }

    function renderChips(){
      const keys = Object.keys(selected).sort();
      const hint = document.getElementById('noDateHint');
      const container = document.getElementById('selectedChips');

      hint.style.display = keys.length ? 'none' : 'block';
      container.innerHTML = keys.map(key=>`
        <div class="chip" id="chip-${key}">
          <span class="chip-label">${selected[key].label}</span>
          <div class="ctp" id="ctp-${key}">
            <button class="ctp-btn" onclick="ctpOpen('${key}')">${selected[key].time || '00:00'}</button>
          </div>
          <button class="chip-remove" onclick="removeDate('${key}')">×</button>
        </div>`
      ).join('');
    }

    // ---- カスタム時間ピッカー ----
    function ctpOpen(key) {
      const wrap = document.getElementById(`ctp-${key}`);
      const [h, m] = (selected[key].time || '00:00').split(':');
      const H = Array.from({length:24}, (_,i) => String(i).padStart(2,'0'));
      const M = Array.from({length:60}, (_,i) => String(i).padStart(2,'0'));
      wrap.innerHTML =
        `<select class="ctp-sel" onchange="ctpHour('${key}',this.value)">` +
        H.map(hh => `<option${hh===h?' selected':''}>${hh}</option>`).join('') +
        `</select><span class="ctp-colon">:</span>` +
        `<select class="ctp-sel" onchange="ctpMin('${key}',this.value)">` +
        M.map(mm => `<option${mm===m?' selected':''}>${mm}</option>`).join('') +
        `</select>`;
    }

    function ctpClose(key) {
      const wrap = document.getElementById(`ctp-${key}`);
      if (wrap) wrap.innerHTML =
        `<button class="ctp-btn" onclick="ctpOpen('${key}')">${selected[key].time}</button>`;
    }

    function ctpHour(key, val) {
      const m = (selected[key].time || '00:00').split(':')[1] || '00';
      selected[key].time = `${val}:${m}`;
      ctpClose(key);
    }

    function ctpMin(key, val) {
      const h = (selected[key].time || '00:00').split(':')[0] || '00';
      selected[key].time = `${h}:${val}`;
      ctpClose(key);
    }

    function removeDate(key){
      delete selected[key];
      renderCalendar();
      renderChips();
    }

    async function createEvent(){
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const deadline = document.getElementById('deadline').value || null;
      const keys = Object.keys(selected).sort();

      if(!title){ showToast('イベント名を入力してください'); return; }
      if(!deadline){ showToast('回答締切日を入力してください'); return; }
      if(keys.length===0){ showToast('候補日程を1つ以上選択してください'); return; }

      const btn = document.getElementById('createBtn');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '作成中…';

      const dates = keys.map(k => {
        const time = selected[k].time ? ` ${selected[k].time}〜` : '';
        return selected[k].label + time;
      });

      try{
        const res = await fetch('/api/events',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ title, description, dates, deadline })
        });
        if(!res.ok) throw new Error('status:' + res.status);
        const data = await res.json();
        const myEvents = JSON.parse(localStorage.getItem('myEvents') || '[]');
        myEvents.push(data.id);
        localStorage.setItem('myEvents', JSON.stringify(myEvents));
        window.location.href = `/result.html?id=${data.id}`;
      } catch(e) {
        showToast('エラー: ' + (e.message || 'もう一度お試しください'));
        btn.disabled = false;
        btn.textContent = 'イベントを作成する →';
      }
    }

    function showToast(msg){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'), 2500);
    }

    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    // ログイン状態表示
    (async () => {
      try {
        const res = await fetch('/auth/me');
        const auth = await res.json();
        const el = document.getElementById('userArea');
        if (!el || !auth.oauthEnabled) return;
        if (auth.loggedIn) {
          el.innerHTML = `<span style="color:white;font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${auth.name}</span><a href="/auth/logout" style="color:rgba(255,255,255,0.75);font-size:11px;white-space:nowrap;text-decoration:underline">ログアウト</a>`;
        } else {
          el.innerHTML = `<a href="/auth/login" style="color:white;background:rgba(255,255,255,0.22);padding:4px 10px;border-radius:12px;font-size:12px;text-decoration:none;white-space:nowrap">Microsoftでログイン</a>`;
        }
      } catch {}
    })();

    const createBtn = document.getElementById('createBtn');
    createBtn.addEventListener('click', createEvent);
    createBtn.addEventListener('touchend', function(e){ e.preventDefault(); createEvent(); });

    renderCalendar();
    renderChips();
  </script>
</body>
</html>
