<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール調整 - 新規作成</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>📅 スケジュール調整</h1>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">イベントを作成する</div>

      <div class="form-group">
        <label>イベント名 <span style="color:#e55">*</span></label>
        <input type="text" id="title" placeholder="例: 6月のミーティング">
      </div>

      <div class="form-group">
        <label>メモ（任意）</label>
        <textarea id="description" rows="2" placeholder="場所・備考など" style="resize:vertical"></textarea>
      </div>

      <div class="form-group">
        <label>候補日程 <span style="color:#e55">*</span></label>
        <p class="hint" style="margin-bottom:10px">自由な形式で入力できます（例: 6月1日（月）13:00〜）</p>
        <div class="date-list" id="dateList">
          <div class="date-item">
            <input type="text" placeholder="候補日程 1">
            <button class="btn-remove" onclick="removeDate(this)" title="削除">×</button>
          </div>
          <div class="date-item">
            <input type="text" placeholder="候補日程 2">
            <button class="btn-remove" onclick="removeDate(this)" title="削除">×</button>
          </div>
          <div class="date-item">
            <input type="text" placeholder="候補日程 3">
            <button class="btn-remove" onclick="removeDate(this)" title="削除">×</button>
          </div>
        </div>
        <button class="btn-add" onclick="addDate()">＋ 日程を追加</button>
      </div>

      <button class="btn btn-primary" onclick="createEvent()">イベントを作成する →</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let dateCount = 3;

    function addDate() {
      dateCount++;
      const list = document.getElementById('dateList');
      const item = document.createElement('div');
      item.className = 'date-item';
      item.innerHTML = `
        <input type="text" placeholder="候補日程 ${dateCount}">
        <button class="btn-remove" onclick="removeDate(this)" title="削除">×</button>
      `;
      list.appendChild(item);
      item.querySelector('input').focus();
    }

    function removeDate(btn) {
      const list = document.getElementById('dateList');
      if (list.children.length <= 1) {
        showToast('日程は1つ以上必要です');
        return;
      }
      btn.parentElement.remove();
    }

    async function createEvent() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dates = Array.from(document.querySelectorAll('#dateList input'))
        .map(i => i.value.trim())
        .filter(v => v);

      if (!title) { showToast('イベント名を入力してください'); return; }
      if (dates.length === 0) { showToast('候補日程を1つ以上入力してください'); return; }

      try {
        const res = await fetch('/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, dates })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        window.location.href = `/result.html?id=${data.id}`;
      } catch {
        showToast('エラーが発生しました。もう一度お試しください。');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
