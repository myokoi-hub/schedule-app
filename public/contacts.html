<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アドレス帳 - スケジュール調整</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5BAD4A">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <header class="header">
    <a class="header-back" onclick="history.back();return false;" href="/">← 戻る</a>
    <h1><a href="/" style="color:white;text-decoration:none;display:flex;align-items:center;gap:8px"><img src="/schedule-icon.png" style="width:32px;height:32px;object-fit:contain;border-radius:6px">スケジュール調整</a></h1>
    <nav class="header-nav"><a href="/">🏠 ホーム</a></nav>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title"><img src="/address-book.png" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px">アドレス帳</div>

      <!-- 検索バー（常時表示） -->
      <input type="search" class="contact-search" id="searchInput"
        placeholder="名前・メールアドレスで検索" oninput="onSearchInput()"
        style="margin-bottom:12px">

      <!-- 追加フォーム（トグル） -->
      <div class="contact-add-form" id="addForm" style="display:none">
        <div class="form-group">
          <label>名前 <span style="color:#e55">*</span></label>
          <input type="text" id="newName" placeholder="例: 田中太郎"
            onkeydown="if(event.key==='Enter')document.getElementById('newEmail').focus()">
        </div>
        <div class="form-group" style="margin-bottom:14px">
          <label>メールアドレス <span style="color:#e55">*</span></label>
          <input type="email" id="newEmail" placeholder="例: tanaka@example.com"
            onkeydown="if(event.key==='Enter')saveContact()">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="saveBtn" onclick="saveContact()" style="flex:1">保存</button>
          <button class="btn btn-secondary" onclick="toggleForm(false)">キャンセル</button>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-add" id="addBtn" onclick="toggleForm(true)" style="flex:1">＋ 連絡先を追加</button>
        <button class="btn btn-secondary" id="toggleListBtn" onclick="toggleList()" style="white-space:nowrap">一覧を表示 ▼</button>
      </div>

      <!-- 並び替え＋連絡先リスト（デフォルト非表示） -->
      <div id="listArea" style="display:none">
        <div id="searchSortArea" style="margin-top:8px;display:none">
          <div class="sort-tabs">
            <button class="sort-tab active" id="sortName" onclick="setSort('name')">あいうえお順</button>
            <button class="sort-tab" id="sortEmail" onclick="setSort('email')">メールアドレス順</button>
          </div>
        </div>

        <!-- 連絡先リスト -->
        <div id="contactList" style="margin-top:12px"></div>
      </div>
    </div>

    <p class="hint" style="text-align:center;margin-top:-8px">
      登録した連絡先はアプリを使う全員で共有されます
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allContacts = [];
    let currentSort = 'name';
    let displayList = [];

    // メールアドレスから苗字部分を取得（例: m.yokoi@... → "yokoi"）
    function getSurname(email) {
      const m = email.match(/^[^.]+\.([^@]+)@/);
      return m ? m[1].toLowerCase() : email.toLowerCase();
    }

    // ローマ字をあいうえお順のソートキーに変換
    const ROMAJI_MAP = [
      ['shi','12'],['chi','17'],['tsu','18'],['sha','11'],['sho','15'],['shu','13'],
      ['a','01'],['i','02'],['u','03'],['e','04'],['o','05'],
      ['ka','06'],['ki','07'],['ku','08'],['ke','09'],['ko','10'],
      ['ga','06'],['gi','07'],['gu','08'],['ge','09'],['go','10'],
      ['sa','11'],['si','12'],['su','13'],['se','14'],['so','15'],
      ['za','11'],['zi','12'],['zu','13'],['ze','14'],['zo','15'],
      ['ta','16'],['ti','17'],['tu','18'],['te','19'],['to','20'],
      ['da','16'],['di','17'],['du','18'],['de','19'],['do','20'],
      ['na','21'],['ni','22'],['nu','23'],['ne','24'],['no','25'],
      ['ha','26'],['hi','27'],['fu','28'],['hu','28'],['he','29'],['ho','30'],
      ['ba','26'],['bi','27'],['bu','28'],['be','29'],['bo','30'],
      ['pa','26'],['pi','27'],['pu','28'],['pe','29'],['po','30'],
      ['ma','31'],['mi','32'],['mu','33'],['me','34'],['mo','35'],
      ['ya','36'],['yu','37'],['yo','38'],
      ['ra','39'],['ri','40'],['ru','41'],['re','42'],['ro','43'],
      ['wa','44'],['wi','45'],['we','46'],['wo','47'],
      ['nn','48'],['n','48'],
    ];
    function romajiKey(str) {
      let key = '', i = 0;
      while (i < str.length) {
        let hit = false;
        for (const [p, k] of ROMAJI_MAP) {
          if (str.startsWith(p, i)) { key += k; i += p.length; hit = true; break; }
        }
        if (!hit) { key += str[i]; i++; }
      }
      return key;
    }

    function setSort(sort) {
      currentSort = sort;
      document.getElementById('sortName').classList.toggle('active', sort === 'name');
      document.getElementById('sortEmail').classList.toggle('active', sort === 'email');
      renderFiltered();
    }

    function onSearchInput() {
      if (!listVisible) {
        listVisible = true;
        document.getElementById('listArea').style.display = 'block';
        document.getElementById('toggleListBtn').textContent = '一覧を隠す ▲';
        renderList(); // fetch して renderFiltered まで呼ぶ
        return;
      }
      renderFiltered();
    }

    function renderFiltered() {
      const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();

      displayList = allContacts.filter(c =>
        c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q)
      );

      if (currentSort === 'name') {
        displayList.sort((a, b) => romajiKey(getSurname(a.email)).localeCompare(romajiKey(getSurname(b.email))));
      } else {
        displayList.sort((a, b) => a.email.localeCompare(b.email));
      }

      renderFromDisplay();
    }

    function moveItem(id, dir) {
      const idx = displayList.findIndex(c => c.id === id);
      if (idx === -1) return;
      const target = idx + dir;
      if (target < 0 || target >= displayList.length) return;
      [displayList[idx], displayList[target]] = [displayList[target], displayList[idx]];
      renderFromDisplay();
    }

    function renderFromDisplay() {
      const el = document.getElementById('contactList');
      const len = displayList.length;

      if (len === 0) {
        const q = (document.getElementById('searchInput')?.value || '').trim();
        el.innerHTML = q
          ? `<p style="text-align:center;color:#aaa;padding:20px 0;font-size:14px">「${esc(q)}」に一致する連絡先はありません</p>`
          : `<p style="text-align:center;color:#aaa;padding:28px 0;font-size:14px">
              連絡先がまだありません<br>
              <span style="font-size:12px">上の「＋ 連絡先を追加」から登録できます</span>
             </p>`;
        return;
      }

      el.innerHTML = displayList.map((c, i) => `
        <div class="contact-item" id="ci-${c.id}">
          <div class="contact-info">
            <div class="contact-name">${esc(c.name)}</div>
            <div class="contact-email">${esc(c.email)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
            <div style="display:flex;flex-direction:column;gap:2px">
              <button class="btn-move" onclick="moveItem('${c.id}',-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
              <button class="btn-move" onclick="moveItem('${c.id}',1)" ${i === len - 1 ? 'disabled' : ''}>↓</button>
            </div>
            <button class="btn-remove" onclick="showEditForm('${c.id}','${esc(c.name)}','${esc(c.email)}')" title="編集" style="color:#5BAD4A">✏️</button>
            <button class="btn-remove" onclick="deleteContact('${c.id}','${esc(c.name)}')" title="削除">🗑</button>
          </div>
        </div>
      `).join('');
    }

    let listVisible = false;

    function toggleList() {
      listVisible = !listVisible;
      document.getElementById('listArea').style.display = listVisible ? 'block' : 'none';
      document.getElementById('toggleListBtn').textContent = listVisible ? '一覧を隠す ▲' : '一覧を表示 ▼';
      if (listVisible) renderList();
    }

    function toggleForm(show) {
      document.getElementById('addForm').style.display = show ? 'block' : 'none';
      document.getElementById('addBtn').style.display  = show ? 'none'  : 'block';
      if (show) {
        document.getElementById('newName').value  = '';
        document.getElementById('newEmail').value = '';
        document.getElementById('newName').focus();
      }
    }

    async function saveContact() {
      const name  = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      if (!name)  { showToast('名前を入力してください'); return; }
      if (!email || !email.includes('@')) { showToast('正しいメールアドレスを入力してください'); return; }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中…';

      try {
        const res = await fetch('/api/contacts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'エラーが発生しました'); return; }
        toggleForm(false);
        showToast('追加しました！');
        renderList();
      } catch {
        showToast('通信エラーが発生しました');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存';
      }
    }

    function showEditForm(id, name, email) {
      const item = document.getElementById(`ci-${id}`);
      item.innerHTML = `
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <input type="text" id="en-${id}" value="${esc(name)}"
            placeholder="名前" style="font-size:14px;padding:6px 10px;border:1px solid #B3D9AE;border-radius:6px;font-family:inherit">
          <input type="email" id="ee-${id}" value="${esc(email)}"
            placeholder="メールアドレス" style="font-size:14px;padding:6px 10px;border:1px solid #B3D9AE;border-radius:6px;font-family:inherit">
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" onclick="saveEdit('${id}')"
              style="flex:1;padding:8px;font-size:13px">保存</button>
            <button class="btn btn-secondary" onclick="renderList()"
              style="font-size:13px;padding:8px 14px">キャンセル</button>
          </div>
        </div>`;
    }

    async function saveEdit(id) {
      const name  = document.getElementById(`en-${id}`).value.trim();
      const email = document.getElementById(`ee-${id}`).value.trim();
      if (!name)  { showToast('名前を入力してください'); return; }
      if (!email || !email.includes('@')) { showToast('正しいメールアドレスを入力してください'); return; }
      try {
        const res = await fetch(`/api/contacts/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'エラーが発生しました'); return; }
        showToast('更新しました！');
        renderList();
      } catch {
        showToast('通信エラーが発生しました');
      }
    }

    async function deleteContact(id, name) {
      if (!confirm(`「${name}」を削除しますか？`)) return;
      try {
        await fetch(`/api/contacts/${id}`, { method: 'DELETE' });
        showToast('削除しました');
        renderList();
      } catch {
        showToast('通信エラーが発生しました');
      }
    }

    async function renderList() {
      const el = document.getElementById('contactList');
      try {
        const res  = await fetch('/api/contacts');
        allContacts = await res.json();

        const area = document.getElementById('searchSortArea');
        area.style.display = allContacts.length > 0 ? 'block' : 'none';

        renderFiltered();
      } catch {
        el.innerHTML = `<p style="text-align:center;color:#e55;padding:20px">読み込みに失敗しました</p>`;
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
