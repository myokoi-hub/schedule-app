<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール調整 - 結果</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5BAD4A">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>@media(max-width:480px){.header{display:flex!important;flex-direction:row!important;align-items:center!important;justify-content:space-between!important;padding:10px 12px!important;gap:8px!important}.header h1{font-size:14px!important;white-space:nowrap!important;word-break:keep-all!important;flex-shrink:0!important}.header h1 a{display:flex!important;align-items:center!important;gap:5px!important;white-space:nowrap!important}.header h1 img{width:22px!important;height:22px!important}.header-nav{position:static!important;transform:none!important;display:flex!important;flex-direction:column!important;align-items:flex-end!important;gap:4px!important;flex-shrink:0!important}.header-nav a{font-size:11px!important;padding:3px 6px!important;white-space:nowrap!important}.header-nav span{font-size:11px!important;white-space:nowrap!important}}</style>
</head>
<body>
  <header class="header">
    <a class="header-back" onclick="history.back();return false;" href="/">← 戻る</a>
    <h1><a href="/" style="color:white;text-decoration:none;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;word-break:keep-all"><img src="/schedule-icon.png" style="width:32px;height:32px;object-fit:contain;border-radius:6px"><span style="white-space:nowrap">スケジュール調整</span></a></h1>
    <nav class="header-nav">
      <span id="userArea" style="display:inline-flex;align-items:center;gap:6px"></span>
      <a href="/">🏠 ホーム</a>
    </nav>
  </header>

  <div class="container">
    <div class="card" id="shareCard" style="display:none">
      <div class="card-title">参加者に送るURL</div>
      <p class="hint" style="margin-bottom:10px">このURLを参加者に送ると、出欠を入力してもらえます</p>
      <div class="share-box">
        <input type="text" id="shareUrl" readonly>
        <button class="btn btn-secondary" onclick="copyUrl()">コピー</button>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="openMailModal()" style="width:100%;display:flex">
          ✉️ メールで送る
        </button>
      </div>
    </div>

    <div class="card" id="mainCard">
      <div style="text-align:center;padding:24px;color:#999">読み込み中...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 確定メール送信モーダル -->
  <div class="modal-overlay" id="confirmMailModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal">
      <div class="modal-title">📅 確定メールを送信</div>

      <div id="cm-dateInfo" style="background:#F0FFF4;border:1px solid #B3D9AE;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#388E3C;font-weight:bold"></div>

      <div class="form-group">
        <label>送信者名 <span style="color:#e55">*</span></label>
        <input type="text" id="cm-senderName" placeholder="例: 山田太郎" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>

      <div class="form-group">
        <label>件名 <span style="color:#e55">*</span></label>
        <input type="text" id="cm-subject" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>

      <div class="form-group">
        <label>場所</label>
        <input type="text" id="cm-location" placeholder="例: 会議室A、Zoomリンクなど" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>

      <div class="form-group">
        <label>本文メモ</label>
        <textarea id="cm-memo" rows="3" placeholder="その他の連絡事項など" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit;resize:vertical"></textarea>
      </div>

      <div class="section-label" style="margin-bottom:6px">送信先 <span style="color:#e55">*</span></div>
      <div class="email-chip-wrap" id="cm-chips">
        <span style="font-size:13px;color:#aaa;align-self:center">下のリストから選んでください</span>
      </div>

      <input class="contact-search" type="text" id="cm-search"
        placeholder="🔍 名前・メアドで検索..." oninput="cmFilterContacts()" autocomplete="off" style="margin-top:8px">

      <button class="btn btn-secondary" id="cm-toggleBtn" onclick="cmToggleList()" style="width:100%;margin:4px 0 0">一覧を表示 ▼</button>

      <div id="cm-listArea" style="display:none;margin-top:8px">
        <div class="contact-picker-list" id="cm-list"></div>
      </div>

      <p style="font-size:12px;color:#888;margin:10px 0 0;text-align:center">
        📩 受信者がOutlookで「承諾」するとカレンダーに自動登録されます
      </p>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" id="cm-sendBtn" onclick="sendConfirmMail()" style="flex:1">📤 送信する</button>
        <button class="btn btn-secondary" onclick="document.getElementById('confirmMailModal').style.display='none'">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 変更モーダル -->
  <div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal" style="max-height:85vh;overflow-y:auto">
      <div class="modal-title">✏️ イベントを変更</div>
      <div class="form-group">
        <label>イベント名 <span style="color:#e55">*</span></label>
        <input type="text" id="edit-title" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="edit-description" rows="2" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit;resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label>回答締切日 <span style="color:#e55">*</span></label>
        <input type="date" id="edit-deadline" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;box-sizing:border-box">
      </div>
      <div class="form-group">
        <label>候補日程</label>
        <div id="edit-dates-list" style="margin-bottom:8px"></div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" id="edit-new-date" style="flex:2;min-width:120px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit">
          <input type="time" id="edit-new-time" value="10:00" style="flex:1;min-width:80px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit">
          <button class="btn btn-secondary" onclick="addEditDate()" style="white-space:nowrap;font-size:13px">＋追加</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" id="edit-saveBtn" onclick="saveEventEdit()" style="flex:1">保存</button>
        <button class="btn btn-secondary" onclick="document.getElementById('editModal').style.display='none'">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- コメントポップアップ -->
  <div id="commentPopup" onclick="this.style.display='none'"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;align-items:center;justify-content:center;padding:24px">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:14px;padding:20px 22px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
      <div style="font-size:13px;color:#888;margin-bottom:6px" id="commentPopupName"></div>
      <div style="font-size:15px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-all" id="commentPopupText"></div>
      <button onclick="document.getElementById('commentPopup').style.display='none'"
        class="btn btn-secondary" style="margin-top:16px;width:100%">閉じる</button>
    </div>
  </div>

  <!-- メール送信モーダル -->
  <div class="modal-overlay" id="mailModal" style="display:none" onclick="overlayClose(event)">
    <div class="modal">
      <div class="modal-title">✉️ 日程調整メールを送る</div>

      <div class="form-group" style="margin-bottom:10px">
        <label>送信者名 <span style="color:#e55">*</span></label>
        <input type="text" id="mailSenderName" placeholder="例: 山田太郎" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>

      <div class="form-group" style="margin-bottom:10px">
        <label>件名</label>
        <input type="text" id="mailSubject" style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit">
      </div>

      <div class="form-group" style="margin-bottom:12px">
        <label>本文</label>
        <textarea id="mailBody" rows="5" style="font-size:13px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box;font-family:inherit;resize:vertical"></textarea>
      </div>

      <div class="section-label" style="margin-bottom:6px">宛先 <span style="color:#e55">*</span></div>
      <div class="email-chip-wrap" id="selectedEmails">
        <span style="font-size:13px;color:#aaa;align-self:center">下のリストから選んでください</span>
      </div>

      <input class="contact-search" type="text" id="contactSearch"
        placeholder="🔍 名前・メアドで検索..." oninput="onModalSearchInput()" autocomplete="off">

      <button class="btn btn-secondary" id="modalToggleBtn" onclick="toggleModalList()"
        style="width:100%;margin:4px 0 0">一覧を表示 ▼</button>

      <div id="modalListArea" style="display:none;margin-top:8px">
        <div class="sort-tabs" style="margin-bottom:8px">
          <button class="sort-tab active" id="modalSortName" onclick="setModalSort('name')">あいうえお順</button>
          <button class="sort-tab" id="modalSortEmail" onclick="setModalSort('email')">メールアドレス順</button>
        </div>
        <div class="contact-picker-list" id="contactPickerList"></div>
      </div>

      <p style="text-align:center;margin-top:10px">
        <a href="/contacts.html" style="font-size:13px;color:#5BAD4A;text-decoration:none">
          ＋ アドレス帳に連絡先を追加
        </a>
      </p>

      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" id="mailSendBtn" onclick="sendMail()" style="flex:1">📤 送信する</button>
        <button class="btn btn-secondary" onclick="document.getElementById('mailModal').style.display='none'">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get('id');

    // ---- 認証状態 ----
    let authState = { loggedIn: false, oauthEnabled: false, name: '' };

    async function checkAuth() {
      try {
        const res = await fetch('/auth/me');
        authState = await res.json();
      } catch {}
      renderAuthStatus();
    }

    function renderAuthStatus() {
      const el = document.getElementById('userArea');
      if (!el || !authState.oauthEnabled) return;
      if (authState.loggedIn) {
        el.innerHTML =
          `<span style="color:white;font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(authState.name)}</span>`+
          `<a href="/auth/logout" style="color:rgba(255,255,255,0.75);font-size:11px;white-space:nowrap;text-decoration:underline">ログアウト</a>`;
      }
    }

    // メールデータ（render()後にセット）
    const mailData = { subject: '', body: '', selected: [] };

    async function load() {
      if (!eventId) { showError('URLが正しくありません'); return; }
      try {
        const res = await fetch(`/api/events/${eventId}/results`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
      } catch {
        showError('イベントが見つかりません');
      }
    }

    let currentDecidedId = null;
    let currentInvited = [];
    let currentTitle = '';
    let currentDates = [];
    let currentDeadline = '';
    let currentDescription = '';

    function render(data) {
      const { title, description, dates, responses, invited_count, deadline, decided_date_id, comments = {}, invited = [] } = data;
      currentDecidedId = decided_date_id;
      currentInvited = invited;
      currentTitle = title;
      currentDates = dates;
      currentDeadline = deadline || '';
      currentDescription = description || '';

      // share URL
      const shareUrl = `${location.origin}/event.html?id=${eventId}`;
      document.getElementById('shareUrl').value = shareUrl;
      document.getElementById('shareCard').style.display = 'block';

      // メールデータをセット（モーダルで使う）
      const deadlineStr = deadline ? (() => {
        const d = new Date(deadline + 'T00:00:00');
        const days = ['日','月','火','水','木','金','土'];
        return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
      })() : '';
      mailData.subject = `日程調整のお願い`;
      mailData.body = `お疲れ様です。\n`
        + `【${title}】の日程調整をお願いしたくご連絡いたしました。\n`
        + `以下の候補日の中でご都合の良い日時をお知らせいただけますと幸いです。\n`
        + `お手数をおかけしますが、よろしくお願いいたします。\n\n`
        + (deadlineStr ? `【回答締切日】　${deadlineStr}\n\n` : '')
        + `候補日程:\n${dates.map(d => `・${d.date_label}`).join('\n')}\n\n`
        + `${shareUrl}`;

      // participants & answer map
      const participants = [...new Set(responses.map(r => r.participant_name))];
      // 招待済みで未回答の人（回答数が招待数に達していたら表示しない）
      const normName = s => s.replace(/[\s　]+/g,'').toLowerCase();
      const respondedSet = new Set();
      // Step1: 完全一致
      participants.forEach(p => {
        invited.forEach(c => { if (normName(c.name) === normName(p)) respondedSet.add(normName(c.name)); });
      });
      // Step2: 部分一致（まだ未マッチの回答者のみ、1人にしか当たらない場合だけ適用）
      participants.filter(p => !invited.some(c => normName(c.name) === normName(p))).forEach(p => {
        const np = normName(p);
        const hits = invited.filter(c => { const nc = normName(c.name); return !respondedSet.has(nc) && (nc.includes(np) || np.includes(nc)); });
        if (hits.length === 1) respondedSet.add(normName(hits[0].name));
      });
      const notRespondedNames = participants.length < (invited.length || 0)
        ? invited.map(c => c.name).filter(n => !respondedSet.has(normName(n)))
        : [];
      const allTablePeople = [...participants, ...notRespondedNames];
      const notRespondedSet = new Set(notRespondedNames);
      const answerMap = {};
      responses.forEach(r => {
        if (!answerMap[r.participant_name]) answerMap[r.participant_name] = {};
        answerMap[r.participant_name][r.date_id] = r.availability;
      });

      // counts per date
      const counts = {};
      dates.forEach(d => { counts[d.id] = { '○': 0, '△': 0, '×': 0 }; });
      responses.forEach(r => {
        if (counts[r.date_id] && r.availability) counts[r.date_id][r.availability]++;
      });

      const markHtml = (v) => {
        if (v === '○') return `<svg viewBox="0 0 36 36" width="22" height="22"><circle cx="18" cy="18" r="13" fill="none" stroke="#5BAD4A" stroke-width="3.5"/></svg>`;
        if (v === '△') return `<svg viewBox="0 0 36 36" width="22" height="22"><polygon points="18,6 32,30 4,30" fill="none" stroke="#F4A261" stroke-width="3.5" stroke-linejoin="round"/></svg>`;
        if (v === '×') return `<svg viewBox="0 0 36 36" width="22" height="22"><line x1="9" y1="9" x2="27" y2="27" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/><line x1="27" y1="9" x2="9" y2="27" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/></svg>`;
        return `<span class="m-none">-</span>`;
      };

      let tableHtml;
      if (allTablePeople.length === 0) {
        tableHtml = `<p style="text-align:center;color:#aaa;padding:28px 0">まだ回答がありません</p>`;
      } else {
        const total = invited_count || participants.length;
        // 推奨日（○が最多）
        const bestDate = dates.reduce((best, d) =>
          counts[d.id]['○'] > counts[best.id]['○'] ? d : best, dates[0]);
        const hasBest = bestDate && counts[bestDate.id]['○'] > 0;

        const headerCols = allTablePeople.map(p => {
          const parts = p.split(/[\s　]+/);
          const surname = parts[0] || p;
          const given   = parts[1] || '';
          const isNR = notRespondedSet.has(p);
          return `
          <th style="text-align:center;min-width:54px;padding:8px 4px;white-space:normal;word-break:break-all${isNR ? ';opacity:0.55' : ''}">
            <div style="font-size:12px;font-weight:bold;line-height:1.6">
              <div>${esc(surname)}</div>
              ${given ? `<div>${esc(given)}</div>` : ''}
              ${isNR ? '<div style="font-size:10px;color:#aaa;font-weight:normal">未回答</div>' : ''}
            </div>
          </th>`;
        }).join('');

        const dateRows = dates.map(d => {
          const ok = counts[d.id]['○'];
          const rate = total > 0 ? Math.round(ok / total * 100) : 0;
          const rateColor = rate >= 70 ? '#4CAF50' : rate >= 40 ? '#FF9800' : '#F44336';
          const isRec = hasBest && d.id === bestDate.id;
          return `
            <tr${isRec ? ' style="background:#F0FFF4"' : ''}>
              <td style="text-align:left;padding:8px 10px;white-space:nowrap">
                ${isRec ? '<div><span class="recommend-badge">🏆 推奨</span></div>' : ''}
                <div style="font-weight:bold;font-size:13px;line-height:1.4">${(() => { const m = d.date_label.match(/^(.+?)\s(\d{1,2}:\d{2}.*)$/); return m ? `${esc(m[1])}<br><span style="font-weight:normal;font-size:12px;color:#666">${esc(m[2])}</span>` : esc(d.date_label); })()}</div>
              </td>
              <td style="text-align:center;padding:8px 8px">
                <div style="font-weight:bold;font-size:14px;color:${rateColor}">${rate}%</div>
                <div style="height:4px;background:#eee;border-radius:2px;margin-top:3px;width:48px;margin-left:auto;margin-right:auto">
                  <div style="height:4px;background:${rateColor};border-radius:2px;width:${rate}%"></div>
                </div>
              </td>
              ${allTablePeople.map(p => `<td style="text-align:center;padding:8px 4px">${notRespondedSet.has(p) ? '<span style="color:#ccc">-</span>' : markHtml(answerMap[p]?.[d.id])}</td>`).join('')}
            </tr>`;
        }).join('');

        const hasComments = participants.some(p => comments[p]);
        const commentRow = hasComments ? `
          <tr style="background:#F8FAFC;border-top:2px solid #EEE">
            <td style="text-align:left;padding:8px 10px;font-size:12px;color:#888;font-weight:normal">コメント</td>
            <td></td>
            ${allTablePeople.map(p => comments[p]
              ? `<td style="text-align:center;padding:6px 4px">
                   <span class="comment-icon" onclick="showComment('${esc(comments[p]).replace(/'/g,"\\'")}','${esc(p)}')" title="${esc(comments[p])}">💬</span>
                 </td>`
              : `<td></td>`
            ).join('')}
          </tr>` : '';

        tableHtml = `
          <div style="overflow-x:auto">
            <table class="result-table">
              <thead>
                <tr>
                  <th style="text-align:left">候補日</th>
                  <th style="text-align:center;min-width:70px">参加率</th>
                  ${headerCols}
                </tr>
              </thead>
              <tbody>${dateRows}${commentRow}</tbody>
            </table>
          </div>`;
      }

      // 締切日HTML
      let deadlineHtml = '';
      if (deadline) {
        const d = new Date(deadline + 'T23:59:59');
        const now = new Date();
        const diffDays = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
        const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        if (diffDays < 0) {
          deadlineHtml = `<div class="deadline-badge expired">⏰ 締切済み（${dateStr}）</div>`;
        } else if (diffDays === 0) {
          deadlineHtml = `<div class="deadline-badge today">⏰ 本日締切（${dateStr}）</div>`;
        } else {
          deadlineHtml = `<div class="deadline-badge">⏰ 締切: ${dateStr}（残り${diffDays}日）</div>`;
        }
      }

      // 確定日バナー
      let decidedBanner = '';
      if (decided_date_id != null) {
        const decidedDate = dates.find(d => d.id == decided_date_id);
        if (decidedDate) {
          decidedBanner = `
            <div class="decided-banner">✅ 確定日: ${esc(decidedDate.date_label)}</div>`;
        }
      }

      // 推奨候補日（参加率順）
      let recommendHtml = '';
      if (participants.length > 0) {
        const total = invited_count || participants.length;
        const sorted = [...dates].sort((a, b) => {
          if (counts[b.id]['○'] !== counts[a.id]['○']) return counts[b.id]['○'] - counts[a.id]['○'];
          return counts[b.id]['△'] - counts[a.id]['△'];
        }).filter(d => counts[d.id]['○'] > 0);

        if (sorted.length > 0) {
          const btnHtml = sorted.map(d => {
            const ok = counts[d.id]['○'];
            const san = counts[d.id]['△'];
            const bat = counts[d.id]['×'];
            const rate = Math.round(ok / total * 100);
            const isDecided = decided_date_id == d.id;
            return `
              <button class="recommend-btn${isDecided ? ' decided' : ''}"

    // ---- 確定日 ----
    async function decideDate(dateId, dateLabel) {
      const isCancel = dateId == currentDecidedId;
      const msg = isCancel
        ? `「${dateLabel}」の決定を取り消しますか？`
        : `「${dateLabel}」を確定日にしますか？`;
      if (!confirm(msg)) return;
      try {
        const res = await fetch(`/api/events/${eventId}/decide`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date_id: isCancel ? null : dateId })
        });
        if (!res.ok) throw new Error();
        await load();
        if (!isCancel) {
          openConfirmMailModal(dateLabel);
        }
      } catch {
        showToast('エラーが発生しました');
      }
    }

      const wrap = document.getElementById('cm-chips');
      if (cmSelected.length === 0) {

    function cmToggleContact(id) {
      const contact = allContacts.find(c => c.id === id) || cmSelected.find(c => c.id === id);

      cmListVisible = !cmListVisible;

      if (!cmListVisible) {

        document.getElementById('cm-listArea').style.display = 'block';

      if (allContacts.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#aaa;padding:14px;font-size:13px">連絡先がありません<br><a href="/contacts.html" style="color:#5BAD4A">アドレス帳に追加する →</a></p>';
        return;
      }
      let filtered = q
        ? allContacts.filter(c => c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))
        : [...allContacts];
      filtered.sort((a, b) => romajiKey(getSurname(a.email)).localeCompare(romajiKey(getSurname(b.email))));
      list.innerHTML = filtered.map(c => {
        const sel = cmSelected.some(s => s.id === c.id);

          <div class="contact-picker-item${sel ? ' cp-selected' : ''}" onclick="cmToggleContact('${c.id}')">
            <div class="contact-check">${sel ? '✓' : ''}</div>

      const location = document.getElementById('cm-location').value.trim();

    function parseJpDate(label) {
      const m = label.match(/(\d+)月(\d+)日[^　\s]*[\s　]+(\d+):(\d+)/);
      const m2 = label.match(/(\d+)月(\d+)日/);
      if (!m2) return null;
      const month = parseInt(m ? m[1] : m2[1]);
      const day   = parseInt(m ? m[2] : m2[2]);
      const hour  = m ? parseInt(m[3]) : 10;
      const min   = m ? parseInt(m[4]) : 0;
      const now = new Date();
      let year = now.getFullYear();
      if (new Date(year, month-1, day) < new Date(now.getFullYear(), now.getMonth(), now.getDate())) year++;
      const pad = n => String(n).padStart(2,'0');
      const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
      const start = new Date(year, month-1, day, hour, min);
      const end   = new Date(year, month-1, day, hour+1, min);
      return { start: fmt(start), end: fmt(end) };
    }

    function sendDecideNotification(dateLabel) {
      const emails = currentInvited.map(c => c.email).filter(Boolean);
      if (emails.length === 0) {
        showToast('招待済みの連絡先がないためメール送信をスキップしました');
        return;
      }
      if (!confirm(`${emails.length}名に確定日の案内メールを送りますか？\n\n宛先: ${emails.join(', ')}`)) return;

      const subject = encodeURIComponent(`日程確定のお知らせ`);
      const body = encodeURIComponent(
        `お疲れ様です。\n` +
        `【${currentTitle}】の日程が確定しましたのでご案内いたします。\n\n` +
        `【日時】${dateLabel}\n\n` +
        `当日はよろしくお願いいたします。`
      );
      window.location.href = `mailto:${emails.join(',')}?subject=${subject}&body=${body}`;
    }

    // ---- イベント変更 ----
    let editDates = [];
    let originalDateLabels = [];

    function openEditModal() {
      document.getElementById('edit-title').value = currentTitle;
      document.getElementById('edit-description').value = currentDescription;
      document.getElementById('edit-deadline').value = currentDeadline;

      originalDateLabels = editDates.map(d => d.label);

    function renderEditDates() {
      const el = document.getElementById('edit-dates-list');
      if (editDates.length === 0) {

      }
      el.innerHTML = editDates.map((d, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;background:#F0FFF4;border:1px solid #B3D9AE;border-radius:8px;padding:7px 10px;margin-bottom:5px">
          <span style="font-size:13px">${esc(d.label)}</span>

        </div>`).join('');

    function removeEditDate(idx) {
      if (!confirm(`「${editDates[idx].label}」を削除します。\nこの日程への全員の回答も削除されますが、よろしいですか？`)) return;
      editDates.splice(idx, 1);
      renderEditDates();

    function addEditDate() {
      const dateVal = document.getElementById('edit-new-date').value;
      const timeVal = document.getElementById('edit-new-time').value || '10:00';
      if (!dateVal) { showToast('日付を選択してください'); return; }
      const d = new Date(dateVal + 'T00:00:00');
      const wd = ['日','月','火','水','木','金','土'];
      const label = `${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}） ${timeVal}〜`;
      if (editDates.some(ed => ed.label === label)) { showToast('すでに追加されています'); return; }
      editDates.push({ id: null, label });
      renderEditDates();
      document.getElementById('edit-new-date').value = '';
    }

    async function saveEventEdit() {
      const title = document.getElementById('edit-title').value.trim();
      const description = document.getElementById('edit-description').value.trim();
      const deadline = document.getElementById('edit-deadline').value;
      if (!title) { showToast('イベント名を入力してください'); return; }
      if (!deadline) { showToast('締切日を入力してください'); return; }
      if (editDates.length === 0) { showToast('候補日程を1つ以上追加してください'); return; }

      const btn = document.getElementById('edit-saveBtn');
      btn.disabled = true; btn.textContent = '保存中…';

      const datesChanged =
        editDates.length !== originalDateLabels.length ||
        editDates.some((d, i) => d.label !== originalDateLabels[i]);

      try {
        const res = await fetch(`/api/events/${eventId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, deadline, dates: editDates.map(d => d.label) })
        });
        if (!res.ok) throw new Error('保存失敗');
        document.getElementById('editModal').style.display = 'none';
        showToast('変更を保存しました');
        await load();
        if (datesChanged && currentInvited.length > 0) {
          if (confirm(`日程が変更されました。\n招待済みの${currentInvited.length}名に招待メールを再送しますか？`)) {
            openMailModal();
          }
        }
      } catch (err) {
        showToast('エラー: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = '保存';
      }
    }

    // ---- URLコピー ----
    function copyUrl() {
      const val = document.getElementById('shareUrl').value;
      navigator.clipboard.writeText(val).then(() => showToast('URLをコピーしました！'));
    }

    // ---- メールモーダル ----
    let allContacts = [];  // サーバーから取得した連絡先キャッシュ
    let modalSort = 'name';

    // アドレス帳と同じソートロジック
    function getSurname(email) {
      const m = email.match(/^[^.]+\.([^@]+)@/);
      return m ? m[1].toLowerCase() : email.toLowerCase();
    }
    const ROMAJI_MAP = [
      ['shi','12'],['chi','17'],['tsu','18'],['sha','11'],['sho','15'],['shu','13'],
      ['a','01'],['i','02'],['u','03'],['e','04'],['o','05'],
      ['ka','06'],['ki','07'],['ku','08'],['ke','09'],['ko','10'],
      ['ga','06'],['gi','07'],['gu','08'],['ge','09'],['go','10'],
      ['sa','11'],['si','12'],['su','13'],['se','14'],['so','15'],
      ['za','11'],['zi','12'],['zu','13'],['ze','14'],['zo','15'],
      ['ta','16'],['ti','17'],['tu','18'],['te','19'],['to','20'],
      ['da','16'],['di','17'],['du','18'],['de','19'],['do','20'],
      ['na','21'],['ni','22'],['nu','23'],['ne','24'],['no','25'],
      ['ha','26'],['hi','27'],['fu','28'],['hu','28'],['he','29'],['ho','30'],
      ['ba','26'],['bi','27'],['bu','28'],['be','29'],['bo','30'],
      ['pa','26'],['pi','27'],['pu','28'],['pe','29'],['po','30'],
      ['ma','31'],['mi','32'],['mu','33'],['me','34'],['mo','35'],
      ['ya','36'],['yu','37'],['yo','38'],
      ['ra','39'],['ri','40'],['ru','41'],['re','42'],['ro','43'],
      ['wa','44'],['wi','45'],['we','46'],['wo','47'],
      ['nn','48'],['n','48'],
    ];
    function romajiKey(str) {
      let key = '', i = 0;
      while (i < str.length) {
        let hit = false;
        for (const [p, k] of ROMAJI_MAP) {
          if (str.startsWith(p, i)) { key += k; i += p.length; hit = true; break; }
        }
        if (!hit) { key += str[i]; i++; }
      }
      return key;
    }

    function setModalSort(sort) {
      modalSort = sort;
      document.getElementById('modalSortName').classList.toggle('active', sort === 'name');
      document.getElementById('modalSortEmail').classList.toggle('active', sort === 'email');
      filterContacts();
    }

    let modalListVisible = false;

    function toggleModalList() {
      modalListVisible = !modalListVisible;
      document.getElementById('modalListArea').style.display = modalListVisible ? 'block' : 'none';
      document.getElementById('modalToggleBtn').textContent = modalListVisible ? '一覧を隠す ▲' : '一覧を表示 ▼';
      if (modalListVisible) filterContacts();
    }

    function onModalSearchInput() {
      if (!modalListVisible) {
        modalListVisible = true;
        document.getElementById('modalListArea').style.display = 'block';
        document.getElementById('modalToggleBtn').textContent = '一覧を隠す ▲';
      }
      filterContacts();
    }

    async function openMailModal() {
      mailData.selected = [];
      modalListVisible = false;
      document.getElementById('modalListArea').style.display = 'none';
      document.getElementById('modalToggleBtn').textContent = '一覧を表示 ▼';
      document.getElementById('contactSearch').value = '';
      document.getElementById('mailSubject').value = mailData.subject;
      document.getElementById('mailBody').value = mailData.body;
      renderSelectedEmails();
      document.getElementById('contactPickerList').innerHTML =
        '<p style="text-align:center;color:#aaa;padding:14px;font-size:13px">読み込み中...</p>';
      document.getElementById('mailModal').style.display = 'flex';

      try {
        const res = await fetch('/api/contacts');
        allContacts = await res.json();
      } catch {
        allContacts = [];
      }
    }

    function overlayClose(e) {
      if (e.target === document.getElementById('mailModal')) {
        document.getElementById('mailModal').style.display = 'none';
      }
    }

    function filterContacts() {
      const q = document.getElementById('contactSearch').value.trim().toLowerCase();
      const list = document.getElementById('contactPickerList');

      if (allContacts.length === 0) {
        list.innerHTML = `<p style="text-align:center;color:#aaa;padding:18px;font-size:13px">
          アドレス帳がまだ空です<br>
          <a href="/contacts.html" style="color:#5BAD4A">連絡先を追加する →</a></p>`;
        return;
      }

      let filtered = q
        ? allContacts.filter(c => c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))
        : [...allContacts];

      if (modalSort === 'name') {
        filtered.sort((a, b) => romajiKey(getSurname(a.email)).localeCompare(romajiKey(getSurname(b.email))));
      } else {
        filtered.sort((a, b) => a.email.localeCompare(b.email));
      }

      if (filtered.length === 0) {
        list.innerHTML = `<p style="text-align:center;color:#aaa;padding:14px;font-size:13px">「${esc(q)}」は見つかりません</p>`;
        return;
      }

      list.innerHTML = filtered.map(c => {
        const sel = mailData.selected.some(s => s.id === c.id);
        return `
          <div class="contact-picker-item${sel ? ' cp-selected' : ''}" onclick="toggleContact('${c.id}')">
            <div class="contact-check">${sel ? '✓' : ''}</div>
            <div class="contact-info">
              <div class="contact-name">${esc(c.name)}</div>
              <div class="contact-email">${esc(c.email)}</div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleContact(id) {
      const contact = allContacts.find(c => c.id === id);
      if (!contact) return;
      const idx = mailData.selected.findIndex(s => s.id === id);
      if (idx >= 0) mailData.selected.splice(idx, 1);
      else mailData.selected.push(contact);
      renderSelectedEmails();
      filterContacts();
    }

    function renderSelectedEmails() {
      const wrap = document.getElementById('selectedEmails');
      if (mailData.selected.length === 0) {
        wrap.innerHTML = `<span style="font-size:13px;color:#aaa;align-self:center">下のリストから選んでください</span>`;
        return;
      }
      wrap.innerHTML = mailData.selected.map(c => `
        <span class="email-chip" onclick="toggleContact('${c.id}')" title="${esc(c.email)}">
          ${esc(c.name)} ×
        </span>`).join('');
    }

    async function sendMail() {
      if (mailData.selected.length === 0) {
        showToast('宛先を1人以上選んでください');
        return;
      }
      const senderName = document.getElementById('mailSenderName').value.trim();
      const subject = document.getElementById('mailSubject').value.trim();
      const body    = document.getElementById('mailBody').value.trim();
      if (!senderName) { showToast('送信者名を入力してください'); return; }
      if (!subject) { showToast('件名を入力してください'); return; }

      const btn = document.getElementById('mailSendBtn');
      btn.disabled = true;
      btn.textContent = '送信中…';

      // 招待した人をイベントに記録（分母として使用）
      fetch(`/api/events/${eventId}/invited`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contacts: mailData.selected })
      }).catch(() => {});

      try {
        const res = await fetch(`/api/events/${eventId}/send-invite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            subject, body, senderName,
            recipients: mailData.selected.map(c => ({ name: c.name, email: c.email }))
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '送信失敗');
        document.getElementById('mailModal').style.display = 'none';
        showToast(`✉️ ${data.sent}名にメールを送信しました！`);
      } catch (err) {
        showToast('エラー: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '📤 送信する';
      }
    }

    // ---- ユーティリティ ----
    function showError(msg) {
      document.getElementById('mainCard').innerHTML = `<p style="color:#e55;text-align:center;padding:20px">${msg}</p>`;
    }

    function showComment(text, name) {
      const popup = document.getElementById('commentPopup');
      document.getElementById('commentPopupName').textContent = name;
      document.getElementById('commentPopupText').textContent = text;
      popup.style.display = 'flex';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    checkAuth().then(() => load());
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
