<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール調整 - 結果</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4A90D9">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <header class="header">
    <h1>📅 スケジュール調整</h1>
    <nav class="header-nav"><a href="/contacts.html">📇 アドレス帳</a></nav>
  </header>

  <div class="container">
    <div class="card" id="shareCard" style="display:none">
      <div class="card-title">参加者に送るURL</div>
      <p class="hint" style="margin-bottom:10px">このURLを参加者に送ると、出欠を入力してもらえます</p>
      <div class="share-box">
        <input type="text" id="shareUrl" readonly>
        <button class="btn btn-secondary" onclick="copyUrl()">コピー</button>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="openMailModal()" style="width:100%;display:flex">
          ✉️ メールで送る
        </button>
      </div>
    </div>

    <div class="card" id="mainCard">
      <div style="text-align:center;padding:24px;color:#999">読み込み中...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- メール送信モーダル -->
  <div class="modal-overlay" id="mailModal" style="display:none" onclick="overlayClose(event)">
    <div class="modal">
      <div class="modal-title">✉️ メールで送る</div>

      <div class="section-label" style="margin-bottom:6px">宛先</div>
      <div class="email-chip-wrap" id="selectedEmails">
        <span style="font-size:13px;color:#aaa;align-self:center">下のリストから選んでください</span>
      </div>

      <input class="contact-search" type="text" id="contactSearch"
        placeholder="🔍 名前・メアドで検索..." oninput="filterContacts()" autocomplete="off">

      <div class="contact-picker-list" id="contactPickerList"></div>

      <p style="text-align:center;margin-top:10px">
        <a href="/contacts.html" style="font-size:13px;color:#4A90D9;text-decoration:none">
          ＋ アドレス帳に連絡先を追加
        </a>
      </p>

      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="sendMail()" style="flex:1">メールを開く</button>
        <button class="btn btn-secondary" onclick="document.getElementById('mailModal').style.display='none'">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get('id');

    // メールデータ（render()後にセット）
    const mailData = { subject: '', body: '', selected: [] };

    async function load() {
      if (!eventId) { showError('URLが正しくありません'); return; }
      try {
        const res = await fetch(`/api/events/${eventId}/results`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
      } catch {
        showError('イベントが見つかりません');
      }
    }

    function render(data) {
      const { title, description, dates, responses } = data;

      // share URL
      const shareUrl = `${location.origin}/event.html?id=${eventId}`;
      document.getElementById('shareUrl').value = shareUrl;
      document.getElementById('shareCard').style.display = 'block';

      // メールデータをセット（モーダルで使う）
      mailData.subject = `【出欠確認】${title}`;
      mailData.body = `${title} の日程調整にご協力をお願いします。\n\n`
        + `下記のURLから出欠をご入力ください。\n${shareUrl}\n\n`
        + `【候補日程】\n${dates.map(d => `・${d.date_label}`).join('\n')}`;

      // participants & answer map
      const participants = [...new Set(responses.map(r => r.participant_name))];
      const answerMap = {};
      responses.forEach(r => {
        if (!answerMap[r.participant_name]) answerMap[r.participant_name] = {};
        answerMap[r.participant_name][r.date_id] = r.availability;
      });

      // counts per date
      const counts = {};
      dates.forEach(d => { counts[d.id] = { '○': 0, '△': 0, '×': 0 }; });
      responses.forEach(r => {
        if (counts[r.date_id] && r.availability) counts[r.date_id][r.availability]++;
      });

      const markHtml = (v) => {
        if (v === '○') return `<span class="m-maru">○</span>`;
        if (v === '△') return `<span class="m-sankaku">△</span>`;
        if (v === '×') return `<span class="m-batsu">×</span>`;
        return `<span class="m-none">-</span>`;
      };

      let tableHtml;
      if (participants.length === 0) {
        tableHtml = `<p style="text-align:center;color:#aaa;padding:28px 0">まだ回答がありません</p>`;
      } else {
        const rows = participants.map(p => `
          <tr>
            <td>${esc(p)}</td>
            ${dates.map(d => `<td>${markHtml(answerMap[p]?.[d.id])}</td>`).join('')}
          </tr>
        `).join('');

        const countRow = `
          <tr class="count-row">
            <td>○の合計</td>
            ${dates.map(d => `<td class="m-maru">${counts[d.id]['○']}</td>`).join('')}
          </tr>
        `;

        tableHtml = `
          <div style="overflow-x:auto">
            <table class="result-table">
              <thead>
                <tr>
                  <th style="text-align:left">参加者</th>
                  ${dates.map(d => `<th>${esc(d.date_label)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>${rows}${countRow}</tbody>
            </table>
          </div>
        `;
      }

      document.getElementById('mainCard').innerHTML = `
        <div class="card-title">${esc(title)}</div>
        ${description ? `<p style="color:#666;font-size:14px;margin-bottom:18px">${esc(description)}</p>` : ''}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="section-label" style="margin:0">回答状況（${participants.length}名）</div>
          <button class="btn btn-secondary" onclick="load()" style="font-size:13px;padding:6px 14px">更新</button>
        </div>

        ${tableHtml}

        <div style="margin-top:20px;text-align:center">
          <a href="/event.html?id=${eventId}" class="btn btn-secondary">自分も回答する</a>
          &nbsp;
          <a href="/" class="btn btn-secondary">新しいイベントを作る</a>
        </div>
      `;
    }

    // ---- URLコピー ----
    function copyUrl() {
      const val = document.getElementById('shareUrl').value;
      navigator.clipboard.writeText(val).then(() => showToast('URLをコピーしました！'));
    }

    // ---- メールモーダル ----
    function openMailModal() {
      mailData.selected = [];
      document.getElementById('contactSearch').value = '';
      renderSelectedEmails();
      filterContacts();
      document.getElementById('mailModal').style.display = 'flex';
    }

    function overlayClose(e) {
      if (e.target === document.getElementById('mailModal')) {
        document.getElementById('mailModal').style.display = 'none';
      }
    }

    function getContacts() {
      return JSON.parse(localStorage.getItem('schedule_contacts') || '[]');
    }

    function filterContacts() {
      const q = document.getElementById('contactSearch').value.trim().toLowerCase();
      const all = getContacts();
      const list = document.getElementById('contactPickerList');

      if (all.length === 0) {
        list.innerHTML = `<p style="text-align:center;color:#aaa;padding:18px;font-size:13px">
          アドレス帳がまだ空です<br>
          <a href="/contacts.html" style="color:#4A90D9">連絡先を追加する →</a></p>`;
        return;
      }

      const filtered = q
        ? all.filter(c => c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))
        : all;

      if (filtered.length === 0) {
        list.innerHTML = `<p style="text-align:center;color:#aaa;padding:14px;font-size:13px">「${esc(q)}」は見つかりません</p>`;
        return;
      }

      list.innerHTML = filtered.map(c => {
        const sel = mailData.selected.some(s => s.id === c.id);
        return `
          <div class="contact-picker-item${sel ? ' cp-selected' : ''}" onclick="toggleContact('${c.id}')">
            <div class="contact-check">${sel ? '✓' : ''}</div>
            <div class="contact-info">
              <div class="contact-name">${esc(c.name)}</div>
              <div class="contact-email">${esc(c.email)}</div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleContact(id) {
      const contact = getContacts().find(c => c.id === id);
      if (!contact) return;
      const idx = mailData.selected.findIndex(s => s.id === id);
      if (idx >= 0) mailData.selected.splice(idx, 1);
      else mailData.selected.push(contact);
      renderSelectedEmails();
      filterContacts();
    }

    function renderSelectedEmails() {
      const wrap = document.getElementById('selectedEmails');
      if (mailData.selected.length === 0) {
        wrap.innerHTML = `<span style="font-size:13px;color:#aaa;align-self:center">下のリストから選んでください</span>`;
        return;
      }
      wrap.innerHTML = mailData.selected.map(c => `
        <span class="email-chip" onclick="toggleContact('${c.id}')" title="${esc(c.email)}">
          ${esc(c.name)} ×
        </span>`).join('');
    }

    function sendMail() {
      if (mailData.selected.length === 0) {
        showToast('宛先を1人以上選んでください');
        return;
      }
      const to = mailData.selected.map(c => c.email).join(',');
      window.location.href =
        `mailto:${to}?subject=${encodeURIComponent(mailData.subject)}&body=${encodeURIComponent(mailData.body)}`;
      document.getElementById('mailModal').style.display = 'none';
    }

    // ---- ユーティリティ ----
    function showError(msg) {
      document.getElementById('mainCard').innerHTML = `<p style="color:#e55;text-align:center;padding:20px">${msg}</p>`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
